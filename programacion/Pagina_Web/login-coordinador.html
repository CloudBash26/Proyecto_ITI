<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGRSI - Login Coordinador</title>
    <link rel="stylesheet" href="style3.css">
</head>
<body>
    

    <div class="main-content">
        <div class="login-section">
            <div class="login-header">
                <h3>Acceso Coordinador</h3>
                <p>Ingresa tus credenciales para continuar</p>
            </div>
            
            <form action="dashboard-rol.html" method="POST">
    
    <div class="form-group">
        <label for="cedula">Cédula de Identidad</label>
        <!-- Agregamos minlength, maxlength y un pattern estricto -->
        <input type="text" 
               id="cedula" 
               name="cedula" 
               placeholder="Ej: 12345678" 
               required 
               minlength="8" 
               maxlength="8" 
               pattern="[0-9]{8}" 
               title="La cédula debe contener exactamente 8 números, sin puntos ni guiones.">
    </div>
    
    <div class="form-group">
        <label for="password">Contraseña</label>
        <!-- Agregamos minlength y maxlength -->
        <input type="password" 
               id="password" 
               name="password" 
               placeholder="Tu contraseña" 
               required 
               minlength="8" 
               maxlength="16"
               title="La contraseña debe tener entre 8 y 16 caracteres.">
    </div>
    
    <div class="btn-group">
        <a href="index.html" class="btn-back" style="text-decoration: none; text-align: center; display: inline-block; line-height: 24px;">Volver</a>
        <button type="submit" class="btn-submit">Ingresar</button>
    </div>
</form>
        </div>
    </div>
 <footer style="text-align: center; padding: 30px 20px; margin-top: 40px; color: #666; font-size: 0.9rem; border-top: 1px solid var(--border-color);">
        <p style="margin: 5px 0;"><strong>Empresa: </strong>CloudBash</p>
        <p style="margin: 5px 0;"><strong>Created by: </strong>Antonella Abeldaño, Franco Barros, Israel Guerra, Aliennys Hernandez</p>
      <a href="https://iti.utu.edu.uy/">Instituto Tecnológico de Informática - UTU</a>
    </footer>
</body>
</html>
